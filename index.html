<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My First Webpage</title>
    
    <style>
        /* This is the CSS area where we design the look */
        
        body {
            background-color: #f0f8ff; /* A light 'Alice Blue' background */
            font-family: Arial, sans-serif; /* A cleaner, modern font */
            color: #333; /* Dark grey text (easier on the eyes than pure black) */
            line-height: 1.6; /* Adds space between lines of text */
            padding: 40px; /* Adds space around the edges of the page */
            max-width: 800px; /* Prevents the text from stretching too wide */
            margin: 0 auto; /* Centers the whole page on the screen */
        }

        h1 {
            color: #2c3e50; /* A nice navy blue for the heading */
            border-bottom: 2px solid #2c3e50; /* Adds a line under the heading */
            padding-bottom: 10px;
        }

        p {
            background-color: white;
            padding: 20px;
            border-radius: 8px; /* Rounds the corners of the box */
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); /* Adds a soft shadow */
        }
    </style>
</head>
<body>

    <h1>Welcome to Coding 101</h1>
    
    <p>This is my very first website hosted on GitHub Pages! 
    In this class, we are learning the basics of HTML, 
    how repositories work, and how to share our code with the world.</p>

</body>
</html>
